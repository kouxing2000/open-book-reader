name: Bug report
description: Something in the reader or gallery isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For a quick repro, the extension's ⚠ **Report a problem** button
        (in the reader/gallery toolbar) drafts an email with these fields already filled in — you
        can paste that block here. **Do not report a security vulnerability in a public issue** —
        see [SECURITY.md](https://github.com/kouxing2000/open-book-reader/blob/master/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page (origin + path)
      description: The article/page where it broke. Please strip any query string or tokens.
      placeholder: https://example.com/some/article
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Text reader (Alt+B)
        - Image gallery (Alt+Shift+B)
        - Auto (toolbar icon)
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      description: From chrome://extensions (or manifest "version").
      placeholder: 0.3.1
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Chrome version & OS
      placeholder: Chrome 126 on macOS 15
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the page above
        2. Press Alt+B
        3. ...
