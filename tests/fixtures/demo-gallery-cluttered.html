<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Show us your sunsets! [MEGATHREAD] — PixelBoard</title>
  <!-- A deliberately CLUTTERED image page: forum thread where photos are scattered among
       posts, avatars, ads, and "you may also like" junk. Same procedurally-painted images
       as demo-gallery.html, so the store before/after shows the identical pictures pulled
       into a clean masonry wall. Self-contained, no network. -->
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: -apple-system, "Segoe UI", system-ui, Arial, sans-serif; color: #1f2430;
      background: #e9edf2; line-height: 1.45; }
    a { color: #1a6fd4; text-decoration: none; }

    .topnav { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: 16px;
      background: #16202e; color: #fff; padding: 9px 16px; font-size: 14px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .topnav .logo { font-weight: 800; color: #4fd6c8; font-size: 17px; }
    .topnav .menu { display: flex; gap: 14px; opacity: .9; }
    .topnav .spacer { flex: 1; }
    .topnav .karma { background: #2a3647; padding: 5px 10px; border-radius: 14px; font-size: 12px; }
    .topnav .post { background: #ff5e62; padding: 6px 12px; border-radius: 6px; font-weight: 700; }

    .leaderboard { margin: 10px auto; max-width: 1060px; height: 90px; border: 1px dashed #e0b15f;
      background: repeating-linear-gradient(45deg, #fbe3b8, #fbe3b8 14px, #f7d99e 14px, #f7d99e 28px);
      display: flex; align-items: center; justify-content: center; color: #9a6a14; font-weight: 800;
      letter-spacing: 2px; border-radius: 4px; position: relative; }
    .adtag { position: absolute; top: 4px; left: 8px; font-size: 9px; letter-spacing: 1px; color: #b98a2e; font-weight: 700; }

    .wrap { max-width: 1060px; margin: 0 auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 0 16px 40px; }
    .thread { display: flex; flex-direction: column; gap: 14px; }
    .threadhead { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 14px 18px; }
    .threadhead h1 { font-size: 22px; margin: 0 0 4px; }
    .threadhead .meta { font-size: 12px; color: #8a93a3; }

    .post { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 14px 16px;
      display: grid; grid-template-columns: 56px 1fr; gap: 12px; }
    .avatar { width: 44px; height: 44px; border-radius: 50%; }
    .pmeta { font-size: 12px; color: #8a93a3; margin-bottom: 4px; }
    .pmeta b { color: #16202e; font-size: 13px; }
    .ptext { font-size: 14px; margin: 0 0 10px; }
    .shots { display: flex; flex-wrap: wrap; gap: 8px; }
    .shots img { max-width: 180px; max-height: 150px; width: auto; height: auto; border-radius: 5px;
      border: 1px solid #e3e8ef; display: block; }
    .shots img.big { max-width: 280px; max-height: 220px; }
    .votes { font-size: 12px; color: #8a93a3; margin-top: 8px; }
    .votes span { margin-right: 14px; }

    .inline-ad { height: 110px; border: 1px dashed #e0b15f;
      background: repeating-linear-gradient(-45deg, #fbe3b8, #fbe3b8 14px, #f7d99e 14px, #f7d99e 28px);
      display: flex; align-items: center; justify-content: center; color: #9a6a14; font-weight: 800;
      letter-spacing: 2px; border-radius: 6px; position: relative; }

    .side > div { margin-bottom: 16px; }
    .mpu { height: 250px; border: 1px dashed #e0b15f;
      background: repeating-linear-gradient(45deg, #fbe3b8, #fbe3b8 14px, #f7d99e 14px, #f7d99e 28px);
      display: flex; align-items: center; justify-content: center; color: #9a6a14; font-weight: 800;
      letter-spacing: 2px; border-radius: 4px; position: relative; }
    .panel { background: #fff; border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 14px 16px; }
    .panel h3 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #ff5e62; }
    .yal { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .yal img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; }
    .yal .cap { grid-column: 1 / -1; font-size: 11px; color: #8a93a3; }

    .cookie { position: fixed; left: 0; right: 0; bottom: 0; z-index: 9; background: #16202e; color: #fff;
      padding: 11px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; box-shadow: 0 -2px 12px rgba(0,0,0,.3); }
    .cookie .spacer { flex: 1; }
    .cookie .ok { background: #ff5e62; padding: 7px 16px; border-radius: 6px; font-weight: 700; }
    .cookie .no { border: 1px solid #3a475a; padding: 7px 12px; border-radius: 6px; }
  </style>
</head>
<body>
  <nav class="topnav">
    <span class="logo">◆ PixelBoard</span>
    <span class="menu"><a href="#">Hot</a><a href="#">New</a><a href="#">Top</a><a href="#">Boards</a><a href="#">Wiki</a></span>
    <span class="spacer"></span>
    <span class="karma">⬆ 12.4k karma</span>
    <span class="post">+ New post</span>
  </nav>

  <div class="leaderboard"><span class="adtag">ADVERTISEMENT</span>728 × 90 AD</div>

  <div class="wrap">
    <div class="thread" id="thread"></div>

    <aside class="side">
      <div class="mpu"><span class="adtag">ADVERTISEMENT</span>300 × 250 AD</div>
      <div class="panel">
        <h3>You may also like</h3>
        <div class="yal" id="yal"><div class="cap">Sponsored picks</div></div>
      </div>
      <div class="mpu"><span class="adtag">ADVERTISEMENT</span>300 × 250 AD</div>
    </aside>
  </div>

  <div class="cookie">
    <span>🍪 PixelBoard and 873 partners use cookies to personalise content and ads.</span>
    <span class="spacer"></span>
    <span class="no">Manage</span>
    <span class="ok">Accept all</span>
  </div>

  <script>
    // Same painter + palettes as demo-gallery.html — identical images, scattered into a messy thread.
    function paint(w, h, palette) {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, palette[0]); g.addColorStop(0.5, palette[1]); g.addColorStop(1, palette[2]);
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      const r = ctx.createRadialGradient(w * 0.7, h * 0.3, 0, w * 0.7, h * 0.3, Math.max(w, h) * 0.7);
      r.addColorStop(0, 'rgba(255,255,255,0.35)'); r.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = r; ctx.fillRect(0, 0, w, h);
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const cx = (0.2 + 0.3 * i) * w, cy = (0.75 - 0.18 * i) * h;
        ctx.arc(cx, cy, w * (0.18 - 0.03 * i), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + (0.10 + 0.04 * i) + ')'; ctx.fill();
      }
      return c.toDataURL('image/png');
    }
    const items = [
      [420,560,['#6a3093','#a044ff','#f5d0ff']],[480,360,['#1e3c72','#2a5298','#7db9e8']],
      [400,400,['#ff5f6d','#ffc371','#fff2cc']],[440,600,['#11998e','#38ef7d','#d6ffe9']],
      [500,340,['#373b44','#4286f4','#a6c8ff']],[420,520,['#c94b4b','#4b134f','#e0aaff']],
      [460,360,['#ff9966','#ff5e62','#ffd6cc']],[400,480,['#136a8a','#267871','#9be7d4']],
      [480,420,['#4568dc','#b06ab3','#f3d9ff']],[440,560,['#0f2027','#2c5364','#83a4d4']],
      [500,380,['#aa4b6b','#6b6b83','#dfe6ff']],[420,440,['#f7971e','#ffd200','#fff6cc']],
      [460,600,['#654ea3','#eaafc8','#ffe6f2']],[480,340,['#009245','#fcee21','#eaffd0']],
      [400,520,['#e53935','#e35d5b','#ffd0cf']],
    ];
    const imgEl = (it, cls) => {
      const img = document.createElement('img');
      img.width = it[0]; img.height = it[1]; img.src = paint(it[0], it[1], it[2]);
      if (cls) img.className = cls;
      return img;
    };

    const users = ['dawnchaser','goldenhour_gary','mira_lens','nightowl','pixel_pia','horizonhank','luma','foggymornings'];
    const texts = [
      'Caught this one from my balcony last night, no filter I swear 🔥',
      'Reposting because the colours deserve a second look. Thoughts?',
      'OC from the coast trip. Phone camera, cropped a bit.',
      'This thread is why I joined. Adding mine from the lake.',
      'Not mine but found it in the archives, too good not to share.',
      'Golden hour hit different today. Three from the same 5 minutes.',
    ];

    const thread = document.getElementById('thread');
    const head = document.createElement('div');
    head.className = 'threadhead';
    head.innerHTML = '<h1>Show us your sunsets! [MEGATHREAD]</h1>' +
      '<div class="meta">Posted by u/horizonhank · 14h · 2.3k comments · 18.7k ⬆</div>';
    thread.appendChild(head);

    let idx = 0;
    let post = 0;
    while (idx < items.length) {
      // Every 3rd block is an ad instead of a post.
      if (post > 0 && post % 3 === 0) {
        const ad = document.createElement('div');
        ad.className = 'inline-ad';
        ad.innerHTML = '<span class="adtag">ADVERTISEMENT</span>Promoted post';
        thread.appendChild(ad);
      }
      const p = document.createElement('div');
      p.className = 'post';
      // Avatars reuse a full-size painted image (natural size stays ~400+, so they pass the
      // tiny-image filter), but their data URL is byte-identical to that same-index shot, so
      // collect()'s URL-dedup collapses them — net unique collectable images = the 15 base items.
      const av = imgEl(items[(idx + 7) % items.length], 'avatar');
      av.width = 44; av.height = 44;
      const body = document.createElement('div');
      const meta = document.createElement('div');
      meta.className = 'pmeta';
      meta.innerHTML = '<b>u/' + users[post % users.length] + '</b> · ' + (post + 2) + 'h · ⬆ ' + (120 - post * 7);
      const t = document.createElement('p');
      t.className = 'ptext';
      t.textContent = texts[post % texts.length];
      const shots = document.createElement('div');
      shots.className = 'shots';
      const n = 1 + (post % 3); // 1..3 images per post
      for (let k = 0; k < n && idx < items.length; k++, idx++) {
        shots.appendChild(imgEl(items[idx], k === 0 ? 'big' : ''));
      }
      const votes = document.createElement('div');
      votes.className = 'votes';
      votes.innerHTML = '<span>⬆ ' + (120 - post * 7) + '</span><span>💬 ' + (40 - post * 2) + ' replies</span><span>↗ Share</span><span>⚑ Report</span>';
      body.append(meta, t, shots, votes);
      p.append(av, body);
      thread.appendChild(p);
      post++;
    }

    // "You may also like" sponsored thumbnails (more scattered images).
    const yal = document.getElementById('yal');
    for (let i = 0; i < 4; i++) yal.appendChild(imgEl(items[(i * 3) % items.length]));
  </script>
</body>
</html>
